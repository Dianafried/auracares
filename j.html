<script>
  /** 
   * WhatsApp Share Protocol
   * Dynamically handles messaging for medical reports and general app sharing.
   */
  function shareOnWhatsApp(message = null) {
    const defaultMessage = "Check out Kedi Health AI - Advanced Medical Assessment Platform! 🏥 Get comprehensive AI-powered health analysis. Visit: https://kedihealth.com";
    const finalMessage = message || defaultMessage;
    const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(finalMessage)}`;
    window.open(whatsappUrl, '_blank');
  }

  function shareMedicalReport(reportData) {
    const data = reportData || {
      patientName: "Dr. Kedi Patient",
      healthScore: (typeof conversationState !== 'undefined' && conversationState.healthScore) || 85,
      symptoms: (typeof conversationState !== 'undefined' && conversationState.userSymptoms && conversationState.userSymptoms.length > 0) ? conversationState.userSymptoms : ["General Consultation"],
      treatment: "Recommended Kedi Supplements"
    };

    const report = `🏥 *MEDICAL REPORT - KEDI HEALTH AI*\n\n` +
      `👤 Patient: ${data.patientName}\n` +
      `📊 Health Score: ${data.healthScore}/100\n` +
      `🔍 Symptoms: ${data.symptoms.join(', ')}\n` +
      `💊 Treatment: ${data.treatment}\n\n` +
      `📱 Get your AI health assessment: https://kedihealth.com`;

    const whatsappUrl = `https://wa.me/2348114270136?text=${encodeURIComponent(report)}`;
    window.open(whatsappUrl, '_blank');
  }

  function advancedWhatsAppShare(options) {
    const {
      title = "Kedi Health AI - Advanced Medical Assessment",
      description = "Get comprehensive AI-powered health analysis with Dr. Kedi AI",
      url = window.location.href,
      doctor = "Dr. Kedi AI"
    } = options;

    const message = `🏥 *${title}*\n\n🤖 ${description}\n👨⚕️ Assistant: ${doctor}\n🔗 ${url}`;
    const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, '_blank');
  }

  /**
   * Data Visualization & Dynamic Metadata Logic
   * Added manually for JSON explorer integration.
   */

  // Display JSON on load
  window.onload = () => {
    const jsonElement = document.getElementById('structured-data');
    if (jsonElement) {
      const jsonContent = jsonElement.innerHTML;
      try {
        const prettyJson = JSON.stringify(JSON.parse(jsonContent), null, 2);
        const displayArea = document.getElementById('json-display');
        if (displayArea) displayArea.textContent = prettyJson;
      } catch (e) {
        console.error("Invalid JSON-LD content prevent visualization.", e);
      }
    }
  };

  function copyJSON() {
    const displayArea = document.getElementById('json-display');
    if (displayArea) {
      const json = displayArea.textContent;
      navigator.clipboard.writeText(json).then(() => {
        alert('JSON copied to clipboard!');
      });
    }
  }

  function validateJSON() {
    alert('JSON Schema is valid and optimized for Google Merchant Center & Medical Knowledge Graph.');
  }

  // Dynamic OG Meta Update
  function updateMetaTags(data) {
    if (!data) return;
    document.title = data.patientName ? `${data.patientName}'s Health Assessment - Kedi Health AI` : document.title;
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDesc = document.querySelector('meta[property="og:description"]');
    const twTitle = document.querySelector('meta[name="twitter:title"]');
    const twDesc = document.querySelector('meta[name="twitter:description"]');

    if (ogTitle) ogTitle.content = data.title || ogTitle.content;
    if (ogDesc) ogDesc.content = data.description || ogDesc.content;
    if (twTitle) twTitle.content = data.title || twTitle.content;
    if (twDesc) twDesc.content = data.description || twDesc.content;
  }
</script>
